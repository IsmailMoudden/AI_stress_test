name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository-foundation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate repository placeholders
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODING_STANDARDS.md
          test -f docs/architecture/system-architecture.md
          test -f docs/adr/0001-record-architecture-decisions.md
          test -f docs/adr/0002-use-openrouter-behind-llm-service.md
          test -f docs/ai/llm-service.md
          test -f apps/frontend/index.html
          test -f apps/backend/src/scenario_workbench/llm/service.py
          test -f modules/scenario-builder/README.md
          test -f modules/scenario-engine/README.md
          test -f modules/stress-engine/README.md
          test -f modules/scenario-lab/README.md
          test -f modules/reporting/README.md
